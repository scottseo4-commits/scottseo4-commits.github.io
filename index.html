<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- Google AdSense -->
    <meta name="google-adsense-account" content="ca-pub-7375062544027620">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7375062544027620" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="theme-switch-wrapper">
                <button id="theme-toggle" class="theme-toggle-btn" aria-label="테마 전환">
                    <span class="theme-icon">🌙</span>
                    <span class="theme-text">Dark Mode</span>
                </button>
            </div>
            <!-- Ad Slot 1: Top -->
            <div class="ad-container top-ad">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-7375062544027620"
                     data-ad-slot="auto"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>
            <h1>로또 번호 추첨기</h1>
            <p class="subtitle">버튼을 클릭하여 행운의 번호를 받아보세요!</p>
        </header>
        <main>
            <button id="generate-btn">번호 생성</button>
            <div id="lotto-games-container">
            </div>

            <section class="dinner-section">
                <hr class="divider">
                <h3>저녁 메뉴 추천</h3>
                <p class="form-desc">오늘 저녁 뭐 먹을지 고민될 때 한 번 눌러보세요.</p>
                <div class="dinner-card">
                    <button id="dinner-btn" class="secondary-btn">메뉴 추천 받기</button>
                    <p id="dinner-result" class="dinner-result">따끈한 추천이 여기 표시됩니다.</p>
                </div>
            </section>

            <!-- Ad Slot 2: Middle -->
            <div class="ad-container middle-ad">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-7375062544027620"
                     data-ad-slot="auto"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <section class="partnership-section">
                <hr class="divider">
                <h3>제휴 문의</h3>
                <p class="form-desc">제휴 및 협업 제안은 아래 폼을 통해 남겨주세요.</p>
                <form action="https://formspree.io/f/mwvaozgo" method="POST" class="partnership-form">
                    <div class="form-group">
                        <label for="email">이메일 주소</label>
                        <input type="email" name="email" id="email" placeholder="example@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="message">문의 내용</label>
                        <textarea name="message" id="message" rows="4" placeholder="문의 내용을 입력해주세요." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">문의하기</button>
                </form>
            </section>

            <!-- Ad Slot 3: Bottom -->
            <div class="ad-container bottom-ad">
                <ins class="adsbygoogle"
                     style="display:block"
                     data-ad-client="ca-pub-7375062544027620"
                     data-ad-slot="auto"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <section class="comment-section">
                <hr class="divider">
                <h3>댓글</h3>
                <div id="disqus_thread"></div>
                <script>
                    /**
                    *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                    *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */
        var disqus_config = function () {
            this.page.url = 'https://scottseo4-commits.github.io/';  // New domain URL
            this.page.identifier = 'scottseo4-commits-main'; 
        };
                    (function() { // DON'T EDIT BELOW THIS LINE
                    var d = document, s = d.createElement('script');
                    s.src = 'https://withmyscott.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                    })();
                </script>
                <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
            </section>
        </main>
    </div>
    <script src="main.js"></script>
</body>
</html>
